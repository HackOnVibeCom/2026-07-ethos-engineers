# Deploy to Cloudflare Pages via OpenNext Cloudflare adapter.
# Next.js App Router (SSR/API routes) compiles to a Cloudflare Worker bundle
# via @opennextjs/cloudflare — no static-only limitations.
#
# Build output: .open-next/assets (pages_build_output_dir in wrangler.jsonc)
# Worker entry: .open-next/assets/_worker.js  (copied from .open-next/worker.js)
# Routes file:  .open-next/assets/_routes.json
#
# No org-secret CLOUDFLARE_API_TOKEN → deploy is skipped gracefully.
name: Deploy to Cloudflare Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
env:
  CF_ACCOUNT_ID: fa36ce8e651a803962efe3793f9c4b51
  CF_ZONE_ID: 60a2c82f45b0abccf34c91e51ee91ca8
  CF_PROJECT: ${{ vars.CF_PROJECT_NAME || github.event.repository.name }}
  DEPLOY_DIR: .open-next/assets
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: guard
        env:
          TOK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$TOK" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set in org secrets — deploy skipped"
          fi

      - name: Setup Node
        if: steps.guard.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Next.js with OpenNext Cloudflare Adapter
        if: steps.guard.outputs.ok == 'true'
        run: |
          echo "::notice::Installing dependencies..."
          npm ci
          echo "::notice::Running OpenNext Cloudflare build..."
          npx @opennextjs/cloudflare build
          echo "::notice::Copying worker dependencies and creating _worker.js + _routes.json..."
          cp -R .open-next/cloudflare .open-next/middleware .open-next/server-functions .open-next/.build .open-next/assets/ 2>/dev/null || true
          cp .open-next/worker.js .open-next/assets/_worker.js
          cat << 'EOF' > .open-next/assets/_routes.json
          {
            "version": 1,
            "include": ["/*"],
            "exclude": ["/_next/static/*"]
          }
          EOF
          echo "::notice::Build complete. Output in '${DEPLOY_DIR}'"

      - name: Disable edge cache (hackathon — changes visible immediately)
        if: steps.guard.outputs.ok == 'true'
        run: |
          mkdir -p "${DEPLOY_DIR}"
          if [ ! -f "${DEPLOY_DIR}/_headers" ]; then
            printf '/*\n  Cache-Control: no-store\n' > "${DEPLOY_DIR}/_headers"
            echo "::notice::_headers (no-store) added — edge cache disabled"
          else
            echo "::notice::_headers already present — not overwriting"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.guard.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fa36ce8e651a803962efe3793f9c4b51
          command: pages deploy ${{ env.DEPLOY_DIR }} --project-name=${{ env.CF_PROJECT }} --branch=main

      - name: Attach custom domain
        if: steps.guard.outputs.ok == 'true'
        env:
          TOK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DOMAIN="${CF_PROJECT}.hackonvibe.com"
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${CF_PROJECT}/domains" \
            -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" \
            --data "{\"name\":\"${DOMAIN}\"}" | grep -q '"success":true' \
            && echo "::notice::Domain attached → https://$DOMAIN" \
            || echo "::notice::Domain already attached (normal on re-deploy)"

      - name: Ensure DNS record (UPSERT CNAME → pages.dev)
        if: steps.guard.outputs.ok == 'true'
        env:
          TOK: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          NAME="${CF_PROJECT}.hackonvibe.com"
          DATA="{\"type\":\"CNAME\",\"name\":\"${CF_PROJECT}\",\"content\":\"${CF_PROJECT}.pages.dev\",\"proxied\":true}"
          REC=$(curl -s "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${NAME}" \
                 -H "Authorization: Bearer $TOK")
          ID=$(printf '%s' "$REC" | jq -r '.result[0].id // empty' 2>/dev/null)
          if [ -n "$ID" ]; then
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${ID}" \
              -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" --data "$DATA" \
              | grep -q '"success":true' \
              && echo "::notice::DNS updated → ${CF_PROJECT}.pages.dev" \
              || echo "::warning::DNS update failed (missing Zone:DNS:Edit permission?)"
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer $TOK" -H "Content-Type: application/json" --data "$DATA" \
              | grep -q '"success":true' \
              && echo "::notice::DNS CNAME created → ${NAME}" \
              || echo "::warning::DNS create failed (missing Zone:DNS:Edit permission?)"
          fi
